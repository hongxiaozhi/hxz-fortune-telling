# hxz-fortune Nginx site template
# Copy to /etc/nginx/sites-available/<your-domain> and replace __DOMAIN__ with your domain
server {
    listen 80;
    listen [::]:80;
    server_name fortune.kiosk.pub;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Frontend static files
    root /opt/hxz-fortune/frontend;
    index index.html;

    # API reverse proxy to Gunicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8002/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/fortune.kiosk.pub.access.log;
    error_log  /var/log/nginx/fortune.kiosk.pub.error.log;
}
